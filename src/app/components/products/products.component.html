<div class="continer">
    <div class="filter">
        <div class="filter">
            <app-filter (filterChanged)="onFilterChanged($event)" [initialCategories]="urlCategories"></app-filter>
        </div>
    </div>
    <div class="container mt-4">
        <div class="row g-4">
            @for (product of filteredProducts; track product.Products_id){
            <div class="col-12 col-sm-6 col-lg-4 col-xl-3 d-flex">
                <p-card class="product-grid-card" (click)="goToProduct(product)">
                    <ng-template pTemplate="header">
                        <a [routerLink]="['/products-page', product.Products_id]" [state]="{ product: product }">
                            <img [src]="product.imageUrl || 'https://placehold.co/300x200?text=No+Image'"
                                 (error)="$any($event.target).src='https://placehold.co/300x200?text=No+Image'"
                                 class="card-img-top" [alt]="product.Product_name">
                        </a>
                    </ng-template>
                    <ng-template pTemplate="title">{{ product.Product_name }}</ng-template>
                    <ng-template pTemplate="subtitle"> ₪ {{ product.price }} </ng-template>
                    <ng-template pTemplate="footer">
                        <div class="flex gap-4 mt-1 m-2">
                            <a [routerLink]="['/basket']"><p-button label="הוספה לסל" severity="secondary" class="w-full" [outlined]="true"
                                styleClass="w-full" (onClick)="addToBasket(product)"/></a>
                            <!-- <p-button class="btn" styleClass="btn" label="לרכישה" class="w-full" styleClass="w-full"/> -->
                        </div>
                    </ng-template>
                </p-card>
            </div>
            }
        </div>
    </div>
</div>
